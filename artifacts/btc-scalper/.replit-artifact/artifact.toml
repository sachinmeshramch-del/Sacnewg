kind = "web"
previewPath = "/btc-scalper/"
title = "BTC Scalper AI"
version = "1.0.0"
id = "artifacts/btc-scalper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/btc-scalper/" ]
localPort = 20263

[services.development]
run = "pnpm --filter @workspace/btc-scalper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/btc-scalper", "run", "build" ]
publicDir = "artifacts/btc-scalper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20263"
BASE_PATH = "/btc-scalper/"
