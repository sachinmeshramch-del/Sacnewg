kind = "web"
previewPath = "/"
title = "Gold Scalper AI"
version = "1.0.0"
id = "artifacts/gold-scalper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23682
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gold-scalper run dev"

[services.env]
PORT = "23682"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gold-scalper", "run", "build"]
publicDir = "artifacts/gold-scalper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
