openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Gold Trading AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scalper
    description: Gold Scalper (5-15 min) operations
  - name: intraday
    description: Gold Intraday (1-4 hour) operations
  - name: smc
    description: Smart Money Concepts AI operations
  - name: btc
    description: BTC/USDT scalping signal operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Scalper ──────────────────────────────────────────────────────────────────
  /price:
    get:
      operationId: getPrice
      tags: [scalper]
      summary: Get live XAUUSD price (scalper)
      responses:
        "200":
          description: Current gold price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceResponse"
  /signal:
    get:
      operationId: getSignal
      tags: [scalper]
      summary: Get current AI scalping signal
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [1m, 5m]
            default: 5m
      responses:
        "200":
          description: Current scalping signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScalperSignalResponse"
  /history:
    get:
      operationId: getHistory
      tags: [scalper]
      summary: Get last 20 scalping signals
      responses:
        "200":
          description: Signal history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
  /telegram/configure:
    post:
      operationId: configureTelegram
      tags: [scalper]
      summary: Configure Telegram bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramConfig"
      responses:
        "200":
          description: Configuration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramConfigResponse"
  /telegram/status:
    get:
      operationId: getTelegramStatus
      tags: [scalper]
      summary: Get Telegram configuration status
      responses:
        "200":
          description: Telegram status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramStatusResponse"

  # ─── Intraday ────────────────────────────────────────────────────────────────
  /intraday/price:
    get:
      operationId: getIntradayPrice
      tags: [intraday]
      summary: Get live XAUUSD price (intraday)
      responses:
        "200":
          description: Current gold price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceResponse"
  /intraday/signal:
    get:
      operationId: getIntradaySignal
      tags: [intraday]
      summary: Get current AI intraday signal
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [15m, 30m, 1h]
            default: 15m
      responses:
        "200":
          description: Current intraday signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntradaySignalResponse"
  /intraday/history:
    get:
      operationId: getIntradayHistory
      tags: [intraday]
      summary: Get last 30 intraday signals
      responses:
        "200":
          description: Signal history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntradayHistoryResponse"

  # ─── Smart Money Concepts ────────────────────────────────────────────────────
  /smc/price:
    get:
      operationId: getSmcPrice
      tags: [smc]
      summary: Get live XAUUSD price for Smart Money dashboard
      responses:
        "200":
          description: Current gold price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceResponse"
  /smc/signal:
    get:
      operationId: getSmcSignal
      tags: [smc]
      summary: Get Smart Money Concepts AI signal
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [15m, 1h]
            default: 15m
      responses:
        "200":
          description: SMC signal with full analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmcSignalResponse"
  /smc/history:
    get:
      operationId: getSmcHistory
      tags: [smc]
      summary: Get last 30 SMC signals with win/loss tracking
      responses:
        "200":
          description: Signal history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmcHistoryResponse"
  /smc/zones:
    get:
      operationId: getSmcZones
      tags: [smc]
      summary: Get active Smart Money zones (OBs, FVGs, liquidity)
      responses:
        "200":
          description: Current SMC zones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmcZonesResponse"

  # ─── BTC Scalper ────────────────────────────────────────────────────────────
  /btc/price:
    get:
      operationId: getBtcPrice
      tags: [btc]
      summary: Get live BTC/USDT price with 24h stats
      responses:
        "200":
          description: Current BTC price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BtcPriceResponse"
  /btc/signal:
    get:
      operationId: getBtcSignal
      tags: [btc]
      summary: Get current BTC/USDT scalping signal
      responses:
        "200":
          description: Current BTC scalping signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BtcSignalResponse"
  /btc/history:
    get:
      operationId: getBtcHistory
      tags: [btc]
      summary: Get last 20 BTC scalping signals
      responses:
        "200":
          description: Signal history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BtcHistoryResponse"
  /btc/status:
    get:
      operationId: getBtcStatus
      tags: [btc]
      summary: Get Binance WebSocket connection status
      responses:
        "200":
          description: WebSocket status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BtcStatusResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    PriceResponse:
      type: object
      properties:
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        timestamp:
          type: string
          format: date-time
      required: [price, change, changePercent, high24h, low24h, timestamp]

    ScalperIndicators:
      type: object
      properties:
        rsi:
          type: number
        ema20:
          type: number
        ema50:
          type: number
        macdLine:
          type: number
        macdSignal:
          type: number
        macdHistogram:
          type: number
        atr:
          type: number
      required: [rsi, ema20, ema50, macdLine, macdSignal, macdHistogram, atr]

    ScalperSignalResponse:
      type: object
      properties:
        signal:
          type: string
          enum: [BUY, SELL, HOLD, SETUP]
          description: BUY/SELL = directional; HOLD = no opportunity; SETUP = trend clear, entry forming.
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        trend:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        marketMode:
          type: string
          enum: [TRENDING, SIDEWAYS]
        signalLabel:
          type: string
          description: Human-readable label for the signal type (e.g. TREND FOLLOWING SELL, REVERSAL BUY)
        signalStatus:
          type: string
          enum: [PENDING, CONFIRMED]
          description: PENDING means awaiting 2-candle confirmation; CONFIRMED is a tradable signal.
        signalType:
          type: string
          enum: [TREND, REVERSAL]
          description: TREND = trend-following (HIGH priority); REVERSAL = counter-trend (LOW priority).
        higherTrend:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
          description: 15m higher-timeframe trend direction used for MTF confirmation.
        mtfStatus:
          type: string
          enum: [WAITING, ALIGNED, BLOCKED]
          description: WAITING = HOLD/no entry; ALIGNED = entry matches 15m trend; BLOCKED = entry vs 15m trend conflict.
        entryQuality:
          type: string
          enum: [EARLY, CONFIRMED]
          description: EARLY = preemptive trend entry (60-64 confidence); CONFIRMED = full conf ≥ 65.
        marketState:
          type: string
          enum: [TRENDING, EXHAUSTED, REVERSAL_WATCH]
          description: Detected price-action regime — TRENDING is healthy; EXHAUSTED & REVERSAL_WATCH suppress trend trades.
        blockReason:
          type: string
          description: Human-readable reason a directional signal was blocked (e.g. "Overextended", "Active trade open").
        timeframe:
          type: string
        indicators:
          $ref: "#/components/schemas/ScalperIndicators"
        timestamp:
          type: string
          format: date-time
      required: [signal, confidence, entry, stopLoss, takeProfit, trend, marketMode, timeframe, indicators, timestamp]

    HistoryItem:
      type: object
      properties:
        id:
          type: integer
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        trend:
          type: string
        timeframe:
          type: string
        timestamp:
          type: string
          format: date-time
        outcome:
          type: string
          enum: [WIN, LOSS, PENDING]
          nullable: true
      required: [id, signal, confidence, entry, stopLoss, takeProfit, trend, timeframe, timestamp]

    HistoryResponse:
      type: object
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/HistoryItem"
        total:
          type: integer
      required: [signals, total]

    IntradayIndicators:
      type: object
      properties:
        rsi:
          type: number
        ema20:
          type: number
        ema50:
          type: number
        macdLine:
          type: number
        macdSignal:
          type: number
        macdHistogram:
          type: number
        atr:
          type: number
        support:
          type: number
        resistance:
          type: number
      required: [rsi, ema20, ema50, macdLine, macdSignal, macdHistogram, atr, support, resistance]

    IntradaySignalResponse:
      type: object
      properties:
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        trend:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        timeframe:
          type: string
        holdingPeriod:
          type: string
        indicators:
          $ref: "#/components/schemas/IntradayIndicators"
        timestamp:
          type: string
          format: date-time
      required: [signal, confidence, entry, stopLoss, takeProfit, trend, timeframe, holdingPeriod, indicators, timestamp]

    IntradayHistoryItem:
      type: object
      properties:
        id:
          type: integer
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        trend:
          type: string
        timeframe:
          type: string
        holdingPeriod:
          type: string
        timestamp:
          type: string
          format: date-time
        outcome:
          type: string
          enum: [WIN, LOSS, PENDING]
          nullable: true
      required: [id, signal, confidence, entry, stopLoss, takeProfit, trend, timeframe, holdingPeriod, timestamp]

    IntradayHistoryResponse:
      type: object
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/IntradayHistoryItem"
        total:
          type: integer
      required: [signals, total]

    TelegramConfig:
      type: object
      properties:
        botToken:
          type: string
        chatId:
          type: string
      required: [botToken, chatId]

    TelegramConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    TelegramStatusResponse:
      type: object
      properties:
        configured:
          type: boolean
        chatId:
          type: string
          nullable: true
      required: [configured]

    # ─── SMC Schemas ──────────────────────────────────────────────────────────
    SmcSetup:
      type: object
      properties:
        bos:
          type: boolean
        choch:
          type: boolean
        liquidityGrab:
          type: boolean
        orderBlock:
          type: boolean
        fvg:
          type: boolean
      required: [bos, choch, liquidityGrab, orderBlock, fvg]

    SmcConfidenceBreakdown:
      type: object
      properties:
        trendAlignment:
          type: number
        liquidityConfirmation:
          type: number
        orderBlockReaction:
          type: number
        structureConfirmation:
          type: number
        indicatorSupport:
          type: number
        total:
          type: number
      required: [trendAlignment, liquidityConfirmation, orderBlockReaction, structureConfirmation, indicatorSupport, total]

    SmcSignalResponse:
      type: object
      properties:
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        marketStructure:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        htfTrend:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        setup:
          $ref: "#/components/schemas/SmcSetup"
        confidenceBreakdown:
          $ref: "#/components/schemas/SmcConfidenceBreakdown"
        setupDescription:
          type: string
        holdingPeriod:
          type: string
        rsi:
          type: number
        timeframe:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [signal, confidence, entry, stopLoss, takeProfit, marketStructure, htfTrend, setup, confidenceBreakdown, setupDescription, holdingPeriod, rsi, timeframe, timestamp]

    SmcHistoryItem:
      type: object
      properties:
        id:
          type: integer
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        marketStructure:
          type: string
        setup:
          $ref: "#/components/schemas/SmcSetup"
        setupDescription:
          type: string
        timeframe:
          type: string
        timestamp:
          type: string
          format: date-time
        outcome:
          type: string
          enum: [WIN, LOSS, PENDING]
          nullable: true
      required: [id, signal, confidence, entry, stopLoss, takeProfit, marketStructure, setup, setupDescription, timeframe, timestamp]

    SmcHistoryResponse:
      type: object
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/SmcHistoryItem"
        total:
          type: integer
        winRate:
          type: number
      required: [signals, total, winRate]

    LiquidityLevel:
      type: object
      properties:
        price:
          type: number
        type:
          type: string
          enum: [HIGH, LOW, EQH, EQL]
        strength:
          type: string
          enum: [MAJOR, MINOR]
        grabbed:
          type: boolean
      required: [price, type, strength, grabbed]

    OrderBlock:
      type: object
      properties:
        high:
          type: number
        low:
          type: number
        type:
          type: string
          enum: [BULLISH, BEARISH]
        timeframe:
          type: string
        active:
          type: boolean
      required: [high, low, type, timeframe, active]

    FairValueGap:
      type: object
      properties:
        high:
          type: number
        low:
          type: number
        midpoint:
          type: number
        type:
          type: string
          enum: [BULLISH, BEARISH]
        filled:
          type: boolean
      required: [high, low, midpoint, type, filled]

    SmcZonesResponse:
      type: object
      properties:
        liquidityLevels:
          type: array
          items:
            $ref: "#/components/schemas/LiquidityLevel"
        orderBlocks:
          type: array
          items:
            $ref: "#/components/schemas/OrderBlock"
        fairValueGaps:
          type: array
          items:
            $ref: "#/components/schemas/FairValueGap"
        currentPrice:
          type: number
        timestamp:
          type: string
          format: date-time
      required: [liquidityLevels, orderBlocks, fairValueGaps, currentPrice, timestamp]

    # ─── BTC Schemas ───────────────────────────────────────────────────────────
    BtcPriceResponse:
      type: object
      properties:
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        volume24h:
          type: number
        timestamp:
          type: string
          format: date-time
        wsConnected:
          type: boolean
      required: [price, change, changePercent, high24h, low24h, volume24h, timestamp, wsConnected]

    BtcIndicators:
      type: object
      properties:
        rsi:
          type: number
        ema50:
          type: number
        macdLine:
          type: number
        macdSignal:
          type: number
        macdHistogram:
          type: number
        atr:
          type: number
        volumeAvg20:
          type: number
        currentVolume:
          type: number
        volumeSpike:
          type: boolean
        marketMode:
          type: string
          enum: [TRENDING, SIDEWAYS]
      required: [rsi, ema50, macdLine, macdSignal, macdHistogram, atr, volumeAvg20, currentVolume, volumeSpike, marketMode]

    BtcSignalResponse:
      type: object
      properties:
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        trend:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL]
        marketMode:
          type: string
          enum: [TRENDING, SIDEWAYS]
        buyScore:
          type: number
        sellScore:
          type: number
        indicators:
          $ref: "#/components/schemas/BtcIndicators"
        timestamp:
          type: string
          format: date-time
      required: [signal, confidence, entry, stopLoss, takeProfit, trend, marketMode, buyScore, sellScore, indicators, timestamp]

    BtcHistoryItem:
      type: object
      properties:
        id:
          type: integer
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        trend:
          type: string
        marketMode:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [id, signal, confidence, entry, stopLoss, takeProfit, trend, marketMode, timestamp]

    BtcHistoryResponse:
      type: object
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/BtcHistoryItem"
        total:
          type: integer
      required: [signals, total]

    BtcStatusResponse:
      type: object
      properties:
        wsConnected:
          type: boolean
        dataSource:
          type: string
        lastTickMs:
          type: number
          nullable: true
        reconnectCount:
          type: integer
        symbol:
          type: string
      required: [wsConnected, dataSource, lastTickMs, reconnectCount, symbol]
